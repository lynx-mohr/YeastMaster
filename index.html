<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YeastMaster Live</title>
    <link href="https://fonts.googleapis.com/css2?family=VT323&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="style.css">
    <style>
        /* Kraftfull inloggningsskärm som täcker allt */
        #login-container { 
            display: none; /* Styrs av JS */
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: #000; 
            z-index: 9999;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-family: 'VT323', monospace;
        }

        .login-box { 
            background: #1a1a1a; 
            padding: 2.5rem; 
            border-radius: 12px; 
            border: 2px solid #f39c12;
            box-shadow: 0 0 20px rgba(243, 156, 18, 0.2);
            width: 320px;
            text-align: center;
        }

        .login-box h2 { color: #f39c12; margin-bottom: 1.5rem; letter-spacing: 2px; }

        input { 
            display: block; 
            width: 100%; 
            margin: 15px 0; 
            padding: 12px; 
            background: #000;
            border: 1px solid #444; 
            color: #fff;
            border-radius: 4px; 
            font-family: 'VT323', monospace;
            font-size: 1.2rem;
            box-sizing: border-box;
        }

        button#login-btn { 
            width: 100%; 
            padding: 12px; 
            background: #f39c12; 
            border: none; 
            color: black; 
            border-radius: 4px; 
            cursor: pointer; 
            font-weight: bold; 
            font-family: 'VT323', monospace;
            font-size: 1.5rem;
        }

        button#login-btn:hover { background: #e67e22; }

        /* Dashboard Wrapper - Dold tills man loggat in */
        #dashboard-wrapper { display: none; }

        #logout-btn { 
            position: fixed; 
            top: 10px; 
            right: 10px; 
            padding: 5px 15px; 
            background: #333; 
            color: #999; 
            border: 1px solid #444; 
            cursor: pointer; 
            font-family: 'VT323', monospace;
            z-index: 1000;
        }
        #logout-btn:hover { background: #444; color: #fff; }
    </style>
</head>
<body>

    <div id="login-container">
        <div class="auth-box">
            <h1>YeastMaster</h1>
            <p>Vittnesskyddat moln</p>
            <button id="btn-login" class="btn-primary">Logga in via Google</button>
        </div>
    </div>

    <div id="claim-container">
        <div class="auth-box">
            <h2>Koppla enhet</h2>
            <p>Ange ID från OLED-menyn</p>
            <input type="text" id="input-mac" placeholder="E4:B0:63:AE:1C:25">
            <button id="btn-claim" class="btn-primary">Aktivera Bryggverk</button>
            <p class="hint">Action-meny -> Device ID</p>
        </div>
    </div>

    <div id="dashboard-container">
        <div class="oled-screen">
            <div class="main-display">
                </div>
            
            <div class="chart-section">
                </div>
        </div>
        
        <button id="btn-logout" style="margin-top: 20px; opacity: 0.5;">Logga ut</button>
    </div>

    <script src="https://www.gstatic.com/firebasejs/9.x.x/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.x.x/firebase-auth-compat.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="app.js"></script>

</body>
</html>
