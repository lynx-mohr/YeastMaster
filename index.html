<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YeastMaster Live 2.0</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div id="login-container">
        <div class="auth-box">
            <h1>YeastMaster</h1>
            <p>Vittnesskyddat moln</p>
            <button id="btn-login" class="btn-primary">Logga in via Google</button>
        </div>
    </div>

    <div id="claim-container">
        <div class="auth-box">
            <h2>Koppla enhet</h2>
            <p>Ange ID från OLED-menyn</p>
            <input type="text" id="input-mac" placeholder="E4:B0:63:AE:1C:25">
            <button id="btn-claim" class="btn-primary">Aktivera Bryggverk</button>
            <p class="hint">Action-meny -> Device ID</p>
        </div>
    </div>

<div id="dashboard-container">
    <div class="oled-screen" style="padding-top: 15px; gap: 0;"> 
        
        <div class="main-display" style="display: flex; align-items: flex-end; position: relative;">
            
            <div class="left-col"> 
                <div class="carboy-wrapper">
                    <div class="air-floating">Air: <span id="air-temp-val">--</span>°C</div>

                    <svg viewBox="0 0 100 92" class="carboy-svg" style="display: block;">
                        <rect x="38" y="10" width="24" height="4" fill="var(--oled-color)" rx="1.5" />
                        <path class="glass-line" 
                              d="M44,14 V30 A 30 30 0 1 0 56 30 V14 Z" 
                              style="fill: #4a4a4a !important; fill-opacity: 1 !important;"
                              stroke="var(--oled-color)" 
                              stroke-width="2.5" 
                              stroke-linejoin="round" />
                        <g id="bubble-stream"></g>
                    </svg>
                    <div class="beer-temp"><span id="temp-beer-val">--</span>°C</div>
                </div>
            </div> 

            <div class="right-col">
                <div class="highlight-box" id="strain-val" style="margin-bottom: 8px;">--</div>
                
                <div style="text-align: right; width: 100%;">
                    <div id="profile-val" style="font-size: 1rem; font-weight: 600; margin-bottom: 12px; opacity: 0.7;">--</div>
                    <div class="action-status">
                        <span id="status-arrow" class="blink-active" style="margin-right: 6px; font-size: 1.1rem;">▼</span>
                        <span id="action-val">--</span>
                    </div>
                </div>
            </div>
        </div>

        <hr class="separator-line" style="margin: 0;">

        <div style="text-align: left; padding: 35px 5px 0 5px;">
            <div style="font-size: 1.2rem; font-weight: 800; color: var(--oled-color); letter-spacing: 1px;">PROGRESS</div>
            <hr style="border-top: 1px dashed #555; margin: 4px 0 10px 0; width: 100%; opacity: 0.6;">
            
            <div class="progress-widget" style="margin-bottom: 15px;">
                <div style="display: flex; justify-content: space-between; font-size: 0.75rem; margin-bottom: 4px; color: #888; font-weight: 600;">
                    <span>START</span>
                    <span id="progress-percent">0%</span>
                    <span>READY</span>
                </div>
                <div style="width: 100%; height: 7px; border: 1px solid #444; border-radius: 10px; overflow: hidden; background: rgba(255,255,255,0.05);">
                    <div id="progress-fill" class="progress-fill-anim" style="width: 0%; height: 100%; background-color: #f39c12;"></div>
                </div>
            </div>

            <div style="font-size: 1rem; line-height: 1.5; font-weight: 600;">
                <div>Day: <span id="day-val" style="color: var(--oled-color);">0.0</span></div>
                <div>Phase: <span id="status-text" style="font-weight: 800; color: var(--oled-color);">--</span></div>
            </div>
        </div>

        <div class="chart-section">
            <div style="font-size: 0.85rem; font-weight: 800; color: #888; margin-bottom: 4px; padding-left: 5px; letter-spacing: 1px;">TEMP HISTORY</div>
            <div class="chart-container">
                <canvas id="beer-chart"></canvas>
            </div>
        </div>
        
    </div> 
    <button id="btn-logout" style="display: block; margin: 20px auto 0 auto; opacity: 0.3; background: none; border: 1px solid #666; color: #fff; padding: 5px 15px; border-radius: 4px; cursor: pointer;">LOGOUT</button>
</div>

    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
    <script src="app.js"></script>

</body>
</html>
