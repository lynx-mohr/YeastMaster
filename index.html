<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YeastMaster Live</title>
    <link href="https://fonts.googleapis.com/css2?family=VT323&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div id="login-container">
        <div class="auth-box">
            <h1>YeastMaster</h1>
            <p>Vittnesskyddat moln</p>
            <button id="btn-login" class="btn-primary">Logga in via Google</button>
        </div>
    </div>

    <div id="claim-container">
        <div class="auth-box">
            <h2>Koppla enhet</h2>
            <p>Ange ID från OLED-menyn</p>
            <input type="text" id="input-mac" placeholder="E4:B0:63:AE:1C:25">
            <button id="btn-claim" class="btn-primary">Aktivera Bryggverk</button>
            <p class="hint">Action-meny -> Device ID</p>
        </div>
    </div>

<div id="dashboard-container">
    <div class="oled-screen">
        <div class="main-display">
            <div class="left-col">
                <div class="wifi-icon">
                    <div class="bar bar1"></div>
                    <div class="bar bar2"></div>
                    <div class="bar bar3"></div>
                    <div class="bar bar4"></div>
                </div>
                
       <div class="carboy-wrapper">
    <svg viewBox="0 0 100 100" class="carboy-svg">
        <path class="glass-line" d="
            /* Korken på toppen */
            M44,2 H56 V8 H44 Z 
            /* Halsen */
            M42,8 H58 V20 H42 Z
            /* Den runda kroppen (Använder Arcs för kurvatur) */
            M50,20 
            C20,20 15,35 15,60 
            C15,85 30,98 50,98 
            C70,98 85,85 85,60 
            C85,35 80,20 50,20 Z" />
        
        <g id="bubble-stream"></g>
    </svg>
    
    <div class="beer-temp"><span id="temp-beer-val">--</span>°C</div>
</div>

                <div class="ferm-row" style="margin-top: 15px; font-size: 2.2rem;">
                    Day: <span id="day-val">0.0</span>
                </div>
            </div>

            <div class="right-col">
                <div class="highlight-box" id="status-text">--</div>
                
                <div class="profile-name" id="profile-val">--</div>
                
                <div class="action-status" id="action-val">--</div>
                
                <div class="air-temp" style="margin-top: 10px;">
                    Air: <span id="air-temp-val">--</span>°C
                </div>
            </div>
        </div>

        <hr class="separator-line" style="border-top: 2px dashed #444; margin: 20px 0;">

        <div class="chart-section">
            <div class="chart-container">
                <canvas id="beer-chart"></canvas>
            </div>
        </div>
    </div>
    
    <button id="btn-logout" style="margin-top: 20px; opacity: 0.3; background: none; border: 1px solid #444; color: #888; padding: 5px 10px; font-family: 'VT323'; cursor: pointer;">Logga ut</button>
</div>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
    
    <script src="app.js"></script>

</body>
</html>
