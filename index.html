<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YeastMaster Live</title>
    <link href="https://fonts.googleapis.com/css2?family=VT323&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div id="login-container">
        <div class="auth-box">
            <h1>YeastMaster</h1>
            <p>Vittnesskyddat moln</p>
            <button id="btn-login" class="btn-primary">Logga in via Google</button>
        </div>
    </div>

    <div id="claim-container">
        <div class="auth-box">
            <h2>Koppla enhet</h2>
            <p>Ange ID från OLED-menyn</p>
            <input type="text" id="input-mac" placeholder="E4:B0:63:AE:1C:25">
            <button id="btn-claim" class="btn-primary">Aktivera Bryggverk</button>
            <p class="hint">Action-meny -> Device ID</p>
        </div>
    </div>

<div id="dashboard-container">
    <div class="oled-screen">
        <div class="main-display">
            <div class="left-col">
                <div class="wifi-icon">
                    <div class="bar bar1"></div><div class="bar bar2"></div><div class="bar bar3"></div><div class="bar bar4"></div>
                </div>
                
                <div class="carboy-wrapper">
                    <svg viewBox="0 0 100 100" class="carboy-svg">
                        <path class="glass-line" d="M44,18 H56 M46,18 V25 M54,25 V18" />
                        <circle class="glass-line" cx="50" cy="60" r="30" />
                        <g id="bubble-stream"></g>
                    </svg>
                    <div class="beer-temp"><span id="temp-beer-val">--</span>°C</div>
                </div>
            </div>

            <div class="right-col">
                <div class="highlight-box" id="strain-val">--</div>
                
                <div id="profile-val" style="font-size: 1.6rem; margin-bottom: 5px;">--</div>

                <div class="action-status" style="display: flex; align-items: center; justify-content: flex-end;">
                    <span id="status-arrow" class="blink-active" style="margin-right: 8px;"></span>
                    <span id="action-val">--</span>
                </div>
                
                <div class="air-temp" style="margin-top: 10px;">
                    Air: <span id="air-temp-val">--</span>°C
                </div>
            </div>
        </div>

        <hr class="separator-line" style="border-top: 2px solid var(--oled-color); margin: 15px 0 5px 0;">
        <div class="system-status" style="font-size: 1.8rem;">
            Status: <span id="status-text">--</span>
        </div>

        <div class="chart-section" style="border-top: 1px dashed #444; margin-top: 10px; padding-top: 10px;">
            <div class="chart-container">
                <canvas id="beer-chart"></canvas>
            </div>
        </div>
    </div>
    <button id="btn-logout" style="margin-top: 20px; opacity: 0.2; background: none; border: 1px solid #444; color: #fff; font-family: 'VT323'; cursor: pointer;">LOGOUT</button>
</div>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
    
    <script src="app.js"></script>

</body>
</html>
