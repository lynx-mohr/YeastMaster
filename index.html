<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YeastMaster Live</title>
    <link href="https://fonts.googleapis.com/css2?family=VT323&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div id="login-container">
        <div class="auth-box">
            <h1>YeastMaster</h1>
            <p>Vittnesskyddat moln</p>
            <button id="btn-login" class="btn-primary">Logga in via Google</button>
        </div>
    </div>

    <div id="claim-container">
        <div class="auth-box">
            <h2>Koppla enhet</h2>
            <p>Ange ID från OLED-menyn</p>
            <input type="text" id="input-mac" placeholder="E4:B0:63:AE:1C:25">
            <button id="btn-claim" class="btn-primary">Aktivera Bryggverk</button>
            <p class="hint">Action-meny -> Device ID</p>
        </div>
    </div>

    <div id="dashboard-container">
        <div class="oled-screen">
            
            <div class="main-display">
                
                <div class="left-col" style="width: 50%;"> 
                    <div class="carboy-wrapper" style="transform: scale(1.15); transform-origin: top center; margin-top: 10px;">
                        <svg viewBox="0 0 100 100" class="carboy-svg">
                            <rect x="40" y="6" width="20" height="5" fill="var(--oled-color)" />
                            <polygon points="43,11 57,11 54,20 46,20" fill="var(--oled-color)" style="opacity: 0.6;" />
                            <circle class="glass-line" cx="50" cy="55" r="35" fill="var(--oled-color)" style="opacity: 0.25;" />
                            <g id="bubble-stream"></g>
                        </svg>
                        <div class="beer-temp outlined-text" style="top: 55%;"><span id="temp-beer-val">--</span>°C</div>
                    </div>
                </div> 

                <div class="right-col" style="width: 50%;">
                    <div class="highlight-box" id="strain-val">--</div>
                    
                    <div id="profile-val" style="font-size: 1.6rem; margin-bottom: 8px;">--</div>

                    <div class="action-status" style="display: flex; align-items: center; justify-content: flex-end; font-size: 2rem;">
                        <span id="status-arrow" class="blink-active" style="margin-right: 8px; font-size: 1.5rem;">▼</span>
                        <span id="action-val">--</span>
                    </div>
                    
                    <div class="air-temp" style="margin-top: 12px;">
                        Air: <span id="air-temp-val">--</span>°C
                    </div>
                </div>
            </div>

            <hr class="separator-line" style="border-top: 3px solid var(--oled-color); margin: 25px 0 10px 0;">

            <div style="display: flex; justify-content: space-between; font-size: 1.8rem; margin-bottom: 10px;">
                <div>Day: <span id="day-val">0.0</span></div>
                <div style="text-align: right;">
                    Fermentation phase: <span id="status-text">--</span>
                </div>
            </div> <div class="chart-section" style="border-top: 1px dashed #444; padding-top: 10px;">
                <div class="chart-container">
                    <canvas id="beer-chart"></canvas>
                </div>
            </div>
            
        </div> <button id="btn-logout" style="margin-top: 20px; opacity: 0.2; background: none; border: 1px solid #444; color: #fff; font-family: 'VT323'; cursor: pointer;">LOGOUT</button>
    </div>

    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
    <script src="app.js"></script>

</body>
</html>
