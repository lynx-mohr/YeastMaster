<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YeastMaster Live 2.0</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div id="login-container">
        <div class="auth-box">
            <h1>YeastMaster</h1>
            <p>Vittnesskyddat moln</p>
            <button id="btn-login" class="btn-primary">Logga in via Google</button>
        </div>
    </div>

    <div id="claim-container">
        <div class="auth-box">
            <h2>Koppla enhet</h2>
            <p>Ange ID från OLED-menyn</p>
            <input type="text" id="input-mac" placeholder="E4:B0:63:AE:1C:25">
            <button id="btn-claim" class="btn-primary">Aktivera Bryggverk</button>
            <p class="hint">Action-meny -> Device ID</p>
        </div>
    </div>

<div id="dashboard-container">
    <div class="oled-screen">
        
        <div class="main-display" style="display: flex; align-items: flex-end; margin-bottom: 0; padding-bottom: 0;">
            
            <div class="left-col" style="width: 50%; display: flex; justify-content: center;"> 
                <div class="carboy-wrapper" style="transform: scale(1.15); transform-origin: bottom center; margin: 10px 0 -15px 0;">
     <svg viewBox="0 0 100 92" class="carboy-svg" style="display: block;">
    <g id="stopper">
        <rect x="36" y="2" width="28" height="5" fill="var(--oled-color)" rx="1" />
        <path d="M39,7 L61,7 L58,15 L42,15 Z" fill="var(--oled-color)" />
        <rect x="42" y="13" width="16" height="2" fill="rgba(0,0,0,0.3)" />
    </g>
    
    <path class="glass-line" 
          d="M44,14 V30 A 30 30 0 1 0 56 30 V14 Z" 
          style="fill: #5a5a5a !important; fill-opacity: 1 !important;"
          stroke="var(--oled-color)" 
          stroke-width="2.5" 
          stroke-linejoin="round" />
          
    <g id="bubble-stream"></g>
</svg>
                    <div class="beer-temp outlined-text" style="top: 55%; font-size: 1.7rem;"><span id="temp-beer-val">--</span>°C</div>
                </div>
            </div> 

            <div class="right-col" style="width: 50%; display: flex; flex-direction: column; justify-content: space-between; height: 160px; padding-bottom: 5px; align-items: flex-end;">
                <div class="highlight-box" id="strain-val" style="border-radius: 4px;">--</div>
                
                <div style="text-align: right; width: 100%;">
                    <div id="profile-val" style="font-size: 1.2rem; font-weight: 600; margin-bottom: 8px; opacity: 0.8;">--</div>
                    <div class="action-status" style="display: flex; align-items: center; justify-content: flex-end; font-size: 1.6rem; font-weight: 800; margin-bottom: 5px;">
                        <span id="status-arrow" class="blink-active" style="margin-right: 8px; font-size: 1.2rem;">▼</span>
                        <span id="action-val">--</span>
                    </div>
                    <div class="air-temp" style="font-size: 1.2rem; opacity: 0.8;">
                        Air: <span id="air-temp-val">--</span>°C
                    </div>
                </div>
            </div>
        </div>

        <hr class="separator-line" style="border-top: 3px solid var(--oled-color); margin: 0px 0 10px 0; opacity: 1;">

        <div style="text-align: left; padding: 0 5px;">
            <div style="font-size: 1.3rem; font-weight: 800; color: var(--oled-color); letter-spacing: 1px;">PROGRESS</div>
            <hr style="border-top: 1px dashed #555; margin: 4px 0 10px 0; width: 100%; opacity: 0.6;">
            
            <div style="font-size: 1.1rem; line-height: 1.6; font-weight: 600; padding-left: 5px;">
                <div>Day: <span id="day-val" style="color: var(--oled-color);">0.0</span></div>
                <div>Fermentation phase: <span id="status-text" style="font-weight: 800; color: var(--oled-color);">--</span></div>
            </div>
        </div>

        <div class="chart-section" style="margin-top: 15px; border-top: 1px solid #333; padding-top: 10px;">
            <div style="font-size: 0.9rem; font-weight: 800; color: #888; margin-bottom: 5px; padding-left: 5px; letter-spacing: 1px;">TEMP HISTORY</div>
            <div class="chart-container" style="height: 120px;">
                <canvas id="beer-chart"></canvas>
            </div>
        </div>
        
    </div> 
    <button id="btn-logout" style="display: block; margin: 20px auto 0 auto; opacity: 0.3; background: none; border: 1px solid #666; color: #fff; font-family: 'Inter', sans-serif; padding: 5px 15px; border-radius: 4px; cursor: pointer;">LOGOUT</button>
</div>

    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
    <script src="app.js"></script>

</body>
</html>
