<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YeastMaster Live</title>
    <link href="https://fonts.googleapis.com/css2?family=VT323&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="style.css">
    <style>
        /* Kraftfull inloggningsskärm som täcker allt */
        #login-container { 
            display: none; /* Styrs av JS */
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: #000; 
            z-index: 9999;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-family: 'VT323', monospace;
        }

        .login-box { 
            background: #1a1a1a; 
            padding: 2.5rem; 
            border-radius: 12px; 
            border: 2px solid #f39c12;
            box-shadow: 0 0 20px rgba(243, 156, 18, 0.2);
            width: 320px;
            text-align: center;
        }

        .login-box h2 { color: #f39c12; margin-bottom: 1.5rem; letter-spacing: 2px; }

        input { 
            display: block; 
            width: 100%; 
            margin: 15px 0; 
            padding: 12px; 
            background: #000;
            border: 1px solid #444; 
            color: #fff;
            border-radius: 4px; 
            font-family: 'VT323', monospace;
            font-size: 1.2rem;
            box-sizing: border-box;
        }

        button#login-btn { 
            width: 100%; 
            padding: 12px; 
            background: #f39c12; 
            border: none; 
            color: black; 
            border-radius: 4px; 
            cursor: pointer; 
            font-weight: bold; 
            font-family: 'VT323', monospace;
            font-size: 1.5rem;
        }

        button#login-btn:hover { background: #e67e22; }

        /* Dashboard Wrapper - Dold tills man loggat in */
        #dashboard-wrapper { display: none; }

        #logout-btn { 
            position: fixed; 
            top: 10px; 
            right: 10px; 
            padding: 5px 15px; 
            background: #333; 
            color: #999; 
            border: 1px solid #444; 
            cursor: pointer; 
            font-family: 'VT323', monospace;
            z-index: 1000;
        }
        #logout-btn:hover { background: #444; color: #fff; }
    </style>
</head>
<body>
    <div id="login-container" class="container">
        <h1>YeastMaster Cloud</h1>
        <p>Logga in för att se din jäsning</p>
        <button id="btn-login" class="btn-primary">Logga in med Google</button>
    </div>

    <div id="claim-container" class="container" style="display: none;">
        <h2>Välkommen!</h2>
        <p>Vi hittar ingen YeastMaster kopplad till ditt konto.</p>
        <input type="text" id="input-mac" placeholder="Ange Device ID (t.ex. E4:B0...)">
        <button id="btn-claim" class="btn-primary">Koppla enhet</button>
        <p class="hint">Du hittar ditt ID i Action-menyn på din YeastMaster.</p>
    </div>

    <div id="dashboard-container" style="display: none;">
        <header>
            <span id="user-email"></span>
            <button id="btn-logout">Logga ut</button>
        </header>
        <div id="status-bar">Enhet: <span id="active-device"></span></div>
        <div id="chart-container">
            <canvas id="tempChart"></canvas>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/9.x.x/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.x.x/firebase-auth.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="app.js"></script>
</body>
</html>
